# Single Render web service: API + workers + WebSocket gateway (/ws proxied)
services:
  - type: web
    name: neighbr
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci --include=dev && npm run build:deploy-all
    startCommand: node --max-old-space-size=4096 --expose-gc apps/deploy/all/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GATEWAY_PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        sync: false
      - key: DIGEST_CRON
        value: "0 6 * * 0"
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        sync: false
      - key: PERSPECTIVE_API_KEY
        sync: false
      - key: RADIUS_METERS
        value: "500"
      - key: NOTIFICATION_WINDOW_MS
        value: "3600000"
