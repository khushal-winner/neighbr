# Render Blueprint — Neighbr combined API + background workers
# Docs: https://render.com/docs/blueprint-spec
#
# Before deploy: set secret env vars in the Render dashboard (or link env groups).
# Required: DATABASE_URL, JWT_SECRET, COOKIE_SECRET, REDIS_URL, KAFKA_*, etc.

services:
  - type: web
    name: neighbr-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build:deploy-api
    startCommand: node apps/deploy/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: worker
    name: neighbr-workers
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build:deploy-workers
    startCommand: node apps/deploy/workers/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: KAFKA_BROKER
        sync: false
      - key: KAFKA_USERNAME
        sync: false
      - key: KAFKA_PASSWORD
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: POST_SERVICE_URL
        fromService:
          name: neighbr-api
          type: web
          property: hostport
      - key: INTERNAL_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        sync: false
      - key: DIGEST_CRON
        value: "0 6 * * 0"
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        sync: false
      - key: PERSPECTIVE_API_KEY
        sync: false
      - key: RADIUS_METERS
        value: "500"
      - key: NOTIFICATION_WINDOW_MS
        value: "3600000"
